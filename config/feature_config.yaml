# 特征配置文件
# 从 148 个标准化指标中自动筛选 30-50 个代表性指标
# ============================================================
# 特征配置文件 - 基于实际数据列名（无需列名映射）
# 说明： 可以新增只定义的指标，但需配合导入的数据列头保持一致
#     1、SMA_200 是目前支持周期最长的指标，其他是50~60d。假设你希望有 N周期（默认日k线），那么你需要 N+200-1个行情，
#     才可保证有效数据足够，否则需要预清洗数据
#     2、具体指标算法本系统不提供；可以使用Ta-lib进行快速计算
#     3、针对短线、或分时数据，理论上不需要参考这么多指标；如需要自行取舍训练对应的特征库
#     4、相同指标 部分周期在不同场景可能是冗余、无效、噪音信息，自行评估是否增加，或选择不同长度进行特征化
# ============================================================


# ===== 特征列表（与实际数据列名完全一致） =====
features:
  # ----- 趋势指标 (9 个) -----
  - SMA_5
  - SMA_20
  - SMA_50
#  - SMA_200
  - EMA_12
  - EMA_26
  - ADX
  - ADXR               # ADX 平滑值
  - TRIX               # 三重指数平滑平均

  # ----- 动量指标 (13 个) -----
  - RSI_6
  - RSI_12
  - RSI_24
  - macd               # MACD 快线
  - signal             # MACD 信号线
  - histogram          # MACD 柱状图
  - WILLR_14           # 威廉指标（14 周期）
  - ROC_12             # 变动速率（12 周期）
  - MOM_12             # 动量（12 周期）
  - CMO                # 钱德动量摆动指标
  - fastK              # 随机指标快线 K
  - fastD              # 随机指标快线 D
  - BIAS_12            # 乖离率（12 日）

  # ----- 波动率指标 (4 个) -----
  - ATR_14             # 平均真实波幅（14 周期）
  - upper              # 布林带上轨
  - middle             # 布林带中轨
  - lower              # 布林带下轨

  # ----- 成交量指标 (1 个) -----
  - VOLUME_RATIO       # 量比

  # ----- 增强指标 (8 个) -----
  - PLUS_DI            # DMI 正方向指标
  - MINUS_DI           # DMI 负方向指标
  - aroon_up           # 阿隆指标上轨
  - aroon_down         # 阿隆指标下轨
  - aroon_oscillator   # 阿隆震荡指标
  - PRS_20             # 价格相对强度（20 日）
  - VRS_20             # 成交量相对强度（20 日）
  - WMA_20             # 20 日加权移动平均（可归入趋势或增强）

# 可选：如果希望特征数量更接近原计划 45 个
# 注：以下为实际数据中存在但未选入的列，可酌情添加
#extra_features:
#   附加 19 个
  - SMA_10
  - BIAS_6
  - BIAS_24
  - WILLR_6
  - WILLR_28
  - ROC_6
  - ROC_24
  - MOM_6
  - MOM_24
  - ATR_7
  - ATR_21
  - PRS_5
  - PRS_10
  - PRS_60
  - VRS_5
  - VRS_60
  - dma_diff          # DMA 差值
  - dma_ama           # DMA 平滑线


# 归一化方法：minmax 或 zscore
normalization: minmax

# PCA 降维配置
pca:
  # 保留方差比例 (0.95 = 95%)
  n_components: 0.95
  # 是否白化
  whiten: false

#pca:
#  # 保留方差比例 (0.95 = 95%)
#  n_components: 0.95
#  n_components: 8   # 整数，表示固定维度
#  # 是否白化
#  whiten: false


# 向量数据库配置
vector_db:
  # 距离度量：cosine, euclidean, ip
  distance_metric: cosine
  # 默认查询返回数量
  default_top_k: 10

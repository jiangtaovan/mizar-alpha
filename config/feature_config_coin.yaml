# 特征配置文件 - 针对虚拟货币市场优化
# ============================================================
# 说明：基于虚拟货币特性（24/7交易、高波动、无涨跌停）筛选的核心指标
# 最大周期为 SMA_50，因此至少需要 50+1 = 51 根日线才能保证有效数据
# 归一化使用 Z-score（对极端值稳健），PCA 保留 95% 方差
# ============================================================

# ===== 特征列表（与实际数据列名完全一致） =====
features:
  # ----- 趋势指标 (7个) -----
  - SMA_5
  - SMA_20
  - SMA_50
  - EMA_12
  - EMA_26
  - ADX
  - MACD_macd
  - MACD_signal
  - MACD_histogram

  # ----- 动量指标 (5个) -----
  - RSI_12
  - RSI_24
  - WILLR_14
  - ROC_12
  - MOM_12

  # ----- 波动率指标 (4个) -----
  - ATR_14
  - BBANDS_upper
  - BBANDS_middle
  - BBANDS_lower

  # ----- 成交量指标 (1个) -----
  - VOLUME_RATIO

  # ----- 方向指标 (2个) -----
  - PLUS_DI
  - MINUS_DI

# 归一化方法：推荐 zscore（标准化），对加密货币波动更鲁棒
normalization: zscore

# PCA 降维配置
pca:
  # 保留方差比例 (0.95 = 95%)
  n_components: 0.95
  # 是否白化（通常关闭）
  whiten: false

# 向量数据库配置
vector_db:
  # 距离度量：cosine（余弦相似度）
  distance_metric: cosine
  # 默认查询返回数量
  default_top_k: 10